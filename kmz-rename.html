<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>KMZ Rename Placemark</title>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
</head>

<body style="font-family:Arial; padding:30px">

<h2>Rename Placemark KMZ</h2>

<input type="file" id="fileInput" accept=".kmz">
<button onclick="processKMZ()">Proses</button>

<p id="status"></p>

<script>

function normalizeName(name){

    name = (name ?? "").trim()

    //hapus prefix No / No.
    name = name.replace(/^\s*no\.?\s*/i,"").trim()

    //hapus tanda baca depan
    name = name.replace(/^[\s\.,;:]+/g,"").trim()

    //uppercase huruf
    name = name.toUpperCase()

    //jika angka 1 digit di depan + huruf
    let match = name.match(/^([0-9])([A-Z].*)$/)

    if(match){
        name = "0" + match[1] + match[2]
    }

    //jika angka murni 1 digit
    if(/^[1-9]$/.test(name)){
        name = "0" + name
    }

    return name
}

async function processKMZ(){

    let file = document.getElementById("fileInput").files[0]

    if(!file){
        alert("Pilih file KMZ dulu")
        return
    }

    document.getElementById("status").innerText="Processing..."

    let zip = await JSZip.loadAsync(file)

    let kmlFile=null

    for(let filename in zip.files){

        if(filename.toLowerCase().endsWith(".kml")){
            kmlFile = filename
            break
        }

    }

    if(!kmlFile){
        alert("KML tidak ditemukan")
        return
    }

    let kmlText = await zip.file(kmlFile).async("string")

    let parser = new DOMParser()
    let xml = parser.parseFromString(kmlText,"text/xml")

    let placemarks = xml.getElementsByTagName("Placemark")

    for(let p of placemarks){

        let nameNode = p.getElementsByTagName("name")[0]

        if(!nameNode) continue

        let oldName = nameNode.textContent
        let newName = normalizeName(oldName)

        nameNode.textContent = newName

    }

    let serializer = new XMLSerializer()
    let newKML = serializer.serializeToString(xml)

    zip.file(kmlFile,newKML)

    let blob = await zip.generateAsync({type:"blob"})

    let a=document.createElement("a")
    a.href=URL.createObjectURL(blob)
    a.download="renamed.kmz"
    a.click()

    document.getElementById("status").innerText="Selesai ✔"
<div class="container">
  <div class="card">
    <h1>Rename Placemark di KMZ</h1>

    <div class="card-inner">
      <p class="rules">
        Aturan: hapus prefix <b>No/No.</b> (case-insensitive). Jika hasilnya angka murni 1–9 → jadi <b>01–09</b>.
        Jika ada huruf/simbol (mis. <b>4b</b>, <b>7/1b</b>) → tidak mengubah format selain <b>uppercase huruf</b>.
      </p>

      <div class="row">
        <div class="filebox">
          <input id="file" type="file" accept=".kmz" />
        </div>

        <button id="run" class="primary" disabled>Proses &amp; Buat KMZ Baru</button>
      </div>

      <div id="status" class="status"></div>
    </div>

    <div class="footer">
      <span class="badge">Powered by JSZip</span>
    </div>
  </div>
</div>
}

    
</script>

</body>

</html>
