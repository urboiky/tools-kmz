<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>KMZ → CSV Generator (HOOK Update)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    background:#0f172a;
    font-family:Arial, Helvetica, sans-serif;
    color:#e2e8f0;
    display:flex;
    justify-content:center;
    padding:40px;
}
.container{
    width:900px;
}
.card{
    background:#111827;
    border-radius:12px;
    padding:25px;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
h1{
    text-align:center;
    margin-bottom:25px;
}
.row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:20px;
}
input[type=file]{
    background:#1f2937;
    border:1px solid #374151;
    color:#e2e8f0;
    padding:8px;
    border-radius:6px;
}
button{
    background:#2563eb;
    border:none;
    color:white;
    padding:10px 18px;
    border-radius:6px;
    cursor:pointer;
    font-weight:bold;
}
button:hover{
    background:#1d4ed8;
}
button:disabled{
    background:#374151;
}
table{
    width:100%;
    border-collapse:collapse;
    margin-top:15px;
}
th{
    background:#1f2937;
}
td,th{
    border:1px solid #374151;
    padding:8px;
}
pre{
    background:#020617;
    padding:10px;
    border-radius:6px;
    overflow:auto;
}
.ok{ color:#4ade80; }
.warn{ color:#facc15; }
.err{ color:#f87171; }
</style>
</head>

<body>
<div class="container">
<div class="card">

<h1>KMZ → CSV Generator (HOOK)</h1>

<div class="row">
    <input type="file" id="kmzFile" accept=".kmz">
    <button id="btnConvert" disabled>Convert</button>
    <button id="btnDownload" disabled>Download hook.csv</button>
</div>

<p>Output CSV header: <b>Clamp_Hook_ID,Clamp_Hook_LATITUDE,Clamp_Hook_LONGITUDE</b></p>

<div id="status"></div>

<h3>Preview</h3>
<table id="previewTable"></table>

<h3>Log</h3>
<pre id="log"></pre>

</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>

<script>
const kmzInput = document.getElementById("kmzFile");
const btnConvert = document.getElementById("btnConvert");
const btnDownload = document.getElementById("btnDownload");
const logEl = document.getElementById("log");
const preview = document.getElementById("previewTable");
const status = document.getElementById("status");

let csvText = "";

function log(t){
    logEl.textContent += t + "\n";
}

function normalizeNumber(value){
    if(value == null) return "";
    let v = String(value).trim();

    // ganti koma desimal jadi titik kalau ada
    v = v.replace(",", ".");

    const n = Number(v);
    if (Number.isNaN(n)) return "";

    // hindari scientific notation aneh
    return n.toString();
}

function escapeCSV(value){
    const s = String(value ?? "").trim();
    if (s.includes(",") || s.includes('"') || s.includes("\n") || s.includes("\r")) {
        return `"${s.replace(/"/g, '""')}"`;
    }
    return s;
}

function buildCSV(rows){
    const lines = [];
    lines.push("Clamp_Hook_ID,Clamp_Hook_LATITUDE,Clamp_Hook_LONGITUDE");

    rows.forEach(r => {
        lines.push([
            escapeCSV(r.ID),
            escapeCSV(r.Latitude),
            escapeCSV(r.Longitude)
        ].join(","));
    });

    return lines.join("\r\n");
}

function parseKML(kml){
    const parser = new DOMParser();
    const xml = parser.parseFromString(kml, "text/xml");

    const parseError = xml.getElementsByTagName("parsererror");
    if (parseError.length > 0) {
        throw new Error("KML tidak valid / gagal diparse");
    }

    const placemarks = xml.getElementsByTagName("Placemark");
    const rows = [];

    for (const p of placemarks) {
        const name = p.getElementsByTagName("name")[0]?.textContent?.trim();
        if (!name) continue;

        // cari pola seperti 88R
        const match = name.match(/\b\d+R\b/i);
        if (!match) continue;

        const id = match[0].toUpperCase();

        const coordText = p.getElementsByTagName("coordinates")[0]?.textContent?.trim();
        if (!coordText) continue;

        // ambil koordinat pertama saja: lon,lat[,alt]
        const firstCoord = coordText.split(/\s+/)[0];
        const parts = firstCoord.split(",");

        if (parts.length < 2) continue;

        const lon = normalizeNumber(parts[0]);
        const lat = normalizeNumber(parts[1]);

        if (!lat || !lon) continue;

        rows.push({
            ID: id,
            Latitude: lat,
            Longitude: lon
        });
    }

    return rows;
}

function renderPreview(rows){
    preview.innerHTML = `
        <tr>
            <th>Clamp_Hook_ID</th>
            <th>Clamp_Hook_LATITUDE</th>
            <th>Clamp_Hook_LONGITUDE</th>
        </tr>
    `;

    rows.slice(0, 10).forEach(r => {
        preview.innerHTML += `
            <tr>
                <td>${r.ID}</td>
                <td>${r.Latitude}</td>
                <td>${r.Longitude}</td>
            </tr>
        `;
    });
}

kmzInput.onchange = () => {
    btnConvert.disabled = !kmzInput.files.length;
    btnDownload.disabled = true;
    csvText = "";
    preview.innerHTML = "";
    status.innerHTML = "";
    logEl.textContent = "";
};

btnConvert.onclick = async () => {
    try {
        logEl.textContent = "";
        preview.innerHTML = "";
        status.innerHTML = "";
        btnDownload.disabled = true;
        csvText = "";

        const file = kmzInput.files[0];
        if (!file) {
            status.innerHTML = `<p class="err">Pilih file KMZ dulu.</p>`;
            return;
        }

        log("Reading KMZ...");
        const buffer = await file.arrayBuffer();

        log("Opening ZIP...");
        const zip = await JSZip.loadAsync(buffer);

        let kmlFile = zip.file("doc.kml");

        if (!kmlFile) {
            const kmlName = Object.keys(zip.files).find(f => f.toLowerCase().endsWith(".kml"));
            if (!kmlName) {
                throw new Error("File KML di dalam KMZ tidak ditemukan");
            }
            kmlFile = zip.file(kmlName);
        }

        log("Extracting KML...");
        const kml = await kmlFile.async("text");

        log("Parsing placemarks...");
        const rows = parseKML(kml);

        if (!rows.length) {
            status.innerHTML = `<p class="warn">Tidak ada titik HOOK yang cocok ditemukan.</p>`;
            log("No valid HOOK points found");
            return;
        }

        log("Hook points found: " + rows.length);

        csvText = buildCSV(rows);
        renderPreview(rows);

        btnDownload.disabled = false;
        status.innerHTML = `<p class="ok">Success: ${rows.length} hook points siap di-download.</p>`;
        log("CSV built with comma separator");
        log("Header: Clamp_Hook_ID,Clamp_Hook_LATITUDE,Clamp_Hook_LONGITUDE");
    } catch (err) {
        console.error(err);
        status.innerHTML = `<p class="err">Error: ${err.message}</p>`;
        log("ERROR: " + err.message);
    }
};

btnDownload.onclick = () => {
    if (!csvText) return;

    // UTF-8 tanpa BOM
    const blob = new Blob([csvText], { type: "text/csv;charset=utf-8;" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "hook.csv";
    document.body.appendChild(a);
    a.click();
    a.remove();

    URL.revokeObjectURL(url);
};
</script>

</body>
</html>
